<div
  class="pe-input pe-input--{{ size() }} pe-input--appearance-{{ appearance() }}"
  [class.pe-input--error]="hasError()"
  [class.pe-input--disabled]="disabled()"
  [class.pe-input--read-only]="readOnly()"
  [class.pe-input--required]="required()"
  [attr.aria-invalid]="hasError()"
  [attr.aria-required]="required()"
  [attr.aria-describedby]="describedBy()"
>
  <pe-form-field-label
    [label]="label()"
    [required]="required()"
    [for]="effectiveControlId()"
    [size]="size()"
  />

  <div class="pe-input__group" [class.pe-input__group--focused]="isFocused()">
    <div class="pe-input__left-elements">
      <ng-content select="[pe-input-left-elements]" />
    </div>

    <input
      [id]="effectiveControlId()"
      [type]="type()"
      class="pe-input__field"
      [placeholder]="placeholder()"
      [value]="value()"
      (input)="onInput($event)"
      (blur)="onBlur($event)"
      (focus)="onFocus($event)"
      [disabled]="disabled()"
      [readonly]="readOnly()"
      [required]="required()"
      [attr.maxlength]="maxLength()"
      [attr.minlength]="minLength()"
      [attr.pattern]="pattern()"
      [attr.autocomplete]="autocomplete()"
      [attr.aria-invalid]="hasError()"
      [attr.aria-required]="required()"
      [attr.aria-describedby]="describedBy()"
    />

    <div class="pe-input__right-elements">
      <ng-content select="[pe-input-right-elements]" />
    </div>
  </div>

  <pe-form-field-helper
    [id]="effectiveHelperId()"
    [helperText]="helperText()"
    [errorText]="errorText() || (hasError() && errors().length ? errors()[0].message : '') || null"
    [error]="hasError()"
  />
</div>
